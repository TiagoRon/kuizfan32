name: 🔍 CI — Calidad de Código

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: 🧹 Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar ruff
        run: pip install ruff

      - name: Verificar estilo
        run: ruff check src/ tests/

      - name: Verificar formato
        run: ruff format --check src/ tests/

  test:
    name: 🧪 Tests Unitarios
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ejecutar tests
        run: pytest tests/unit/ -v --tb=short

  type-check:
    name: 🔬 Type Checking
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -e ".[dev]"

      - name: Ejecutar mypy
        run: mypy src/quiz_generator/ --ignore-missing-imports
